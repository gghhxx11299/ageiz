<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agéiz — Neural Yield Intelligence</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #F4F1EA;
            --surface: rgba(255, 255, 255, 0.82);
            --primary: #38422C;
            --primary-glow: rgba(56, 66, 44, 0.18);
            --accent: #BA9240;
            --secondary: #72682A;
            --border: rgba(56, 66, 44, 0.14);
            --text: #38422C;
            --text-dim: #72682A;
            --error: #BA9240;
            --glass: rgba(255, 255, 255, 0.82);
            --staff-color: #BA9240;
            --staff-glow: rgba(186, 146, 64, 0.22);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            overflow: hidden;
        }

        .bg-glow {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 100vw; height: 100vh;
            background:
                radial-gradient(circle at 18% 18%, rgba(56, 66, 44, 0.16) 0%, transparent 38%),
                radial-gradient(circle at 82% 82%, rgba(186, 146, 64, 0.18) 0%, transparent 34%),
                radial-gradient(circle at 50% 0%, rgba(244, 241, 234, 0.72) 0%, transparent 30%);
            z-index: -1;
            filter: blur(80px);
        }

        .login-container {
            width: 100%;
            max-width: 440px;
            position: relative;
        }

        .brand-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #38422C 0%, #BA9240 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 0.9rem;
            color: var(--text-dim);
            letter-spacing: 1px;
            text-transform: uppercase;
            font-weight: 500;
        }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 48px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .tabs {
            display: flex;
            background: rgba(56, 66, 44, 0.06);
            padding: 6px;
            border-radius: 14px;
            margin-bottom: 32px;
            border: 1px solid var(--border);
        }

        .tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-dim);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: none;
            border: none;
            border-radius: 10px;
        }

        .tab.active {
            color: #F4F1EA;
            background: var(--primary);
            box-shadow: 0 4px 15px var(--primary-glow);
        }

        /* Role Selector */
        .role-selector {
            display: flex;
            gap: 12px;
            margin-bottom: 28px;
        }

        .role-btn {
            flex: 1;
            padding: 14px 12px;
            text-align: center;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-dim);
            background: rgba(244, 241, 234, 0.72);
            border: 1px solid var(--border);
            border-radius: 12px;
            transition: all 0.3s;
        }

        .role-btn .role-icon {
            font-size: 1.4rem;
            display: block;
            margin-bottom: 6px;
        }

        .role-btn.manager-active {
            color: #F4F1EA;
            background: var(--primary);
            border-color: var(--primary);
            box-shadow: 0 4px 15px var(--primary-glow);
        }

        .role-btn.staff-active {
            color: #F4F1EA;
            background: var(--accent);
            border-color: var(--accent);
            box-shadow: 0 4px 15px var(--staff-glow);
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-dim);
            margin-bottom: 10px;
            margin-left: 4px;
        }

        input {
            width: 100%;
            padding: 14px 18px;
            background: rgba(255, 255, 255, 0.82);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            font-family: inherit;
            font-size: 0.95rem;
            transition: all 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            background: #FFF;
            box-shadow: 0 0 0 4px var(--primary-glow);
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            background: var(--primary);
            color: #F4F1EA;
            border: none;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .submit-btn.staff-btn {
            background: var(--staff-color);
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px var(--primary-glow);
            filter: brightness(1.1);
        }

        .submit-btn.staff-btn:hover {
            box-shadow: 0 10px 25px var(--staff-glow);
        }

        .error-msg {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: var(--error);
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 0.85rem;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-section { display: none; }
        .form-section.active { display: block; animation: slideIn 0.4s ease-out; }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .footer-note {
            margin-top: 40px;
            text-align: center;
            font-size: 0.75rem;
            color: var(--text-dim);
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="bg-glow"></div>

    <div class="login-container">
        <header class="brand-header">
            <h1 class="logo">Agéiz</h1>
            <p class="subtitle">Neural Yield Management</p>
        </header>

        <div style="margin-bottom: 24px; text-align: center;">
            <select id="language-selector" onchange="changeLanguage(this.value)" style="background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: var(--text); padding: 8px 16px; border-radius: 8px; font-size: 0.8rem; cursor: pointer;">
                <option value="english">🇬🇧 English</option>
                <option value="amharic">🇪🇹 አማርኛ</option>
                <option value="oromoo">🇪🇹 Afaan Oromoo</option>
                <option value="tigrinya">🇪🇭 ትግርኛ</option>
                <option value="chinese">🇨🇳 中文</option>
            </select>
        </div>

        <div class="glass-card">
            {% if error %}
            <div class="error-msg">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
                {{ error }}
            </div>
            {% endif %}

            <div class="tabs">
                <button type="button" class="tab active" data-tab="login">Sign In</button>
                <button type="button" class="tab" data-tab="register">Register</button>
            </div>

            <!-- Role Selector -->
            <div class="role-selector">
                <button type="button" class="role-btn manager-active" data-role="manager" onclick="selectRole('manager')">
                    <span class="role-icon">📊</span>
                    Manager
                </button>
                <button type="button" class="role-btn" data-role="staff" onclick="selectRole('staff')">
                    <span class="role-icon">📝</span>
                    Staff
                </button>
            </div>

            <form action="/auth/login" method="POST" class="form-section active" id="login-form">
                <input type="hidden" name="role" id="login-role" value="manager">
                <div class="form-group">
                    <label>Enterprise Email</label>
                    <input type="email" name="email" required placeholder="name@resort.ai">
                </div>
                <div class="form-group">
                    <label>Security Key</label>
                    <input type="password" name="password" required placeholder="••••••••">
                </div>
                <button type="submit" class="submit-btn" id="login-btn">
                    Launch Dashboard
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
                </button>
            </form>

            <form action="/auth/register" method="POST" class="form-section" id="register-form">
                <input type="hidden" name="role" id="register-role" value="manager">
                <div class="form-group">
                    <label>Corporate Email</label>
                    <input type="email" name="email" required placeholder="name@resort.ai">
                </div>
                <div class="form-group">
                    <label>Create Password</label>
                    <input type="password" name="password" required placeholder="••••••••">
                </div>
                <button type="submit" class="submit-btn" id="register-btn">
                    Initialize Neural Link
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
                </button>
            </form>
        </div>

        <div class="footer-note">Precision Intelligence • Powered by Agéiz</div>
    </div>

    <script>
        // Tab switching
        const tabs = document.querySelectorAll('.tab');
        const sections = document.querySelectorAll('.form-section');

        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                const tabName = tab.dataset.tab;
                tabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                sections.forEach(s => s.classList.remove('active'));
                document.getElementById(`${tabName}-form`).classList.add('active');
            });
        });

        {% if tab == 'register' %}
        document.querySelector('[data-tab="register"]').click();
        {% endif %}

        // Role switching
        let currentRole = 'manager';

        function selectRole(role) {
            currentRole = role;
            document.querySelectorAll('.role-btn').forEach(btn => {
                btn.classList.remove('manager-active', 'staff-active');
            });
            const activeBtn = document.querySelector(`.role-btn[data-role="${role}"]`);
            activeBtn.classList.add(role === 'manager' ? 'manager-active' : 'staff-active');

            // Update hidden inputs
            document.getElementById('login-role').value = role;
            document.getElementById('register-role').value = role;

            // Update button text and style
            const loginBtn = document.getElementById('login-btn');
            const registerBtn = document.getElementById('register-btn');

            if (role === 'staff') {
                loginBtn.classList.add('staff-btn');
                registerBtn.classList.add('staff-btn');
                loginBtn.innerHTML = 'Open Staff Portal <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>';
                registerBtn.innerHTML = 'Register as Staff <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>';
            } else {
                loginBtn.classList.remove('staff-btn');
                registerBtn.classList.remove('staff-btn');
                loginBtn.innerHTML = 'Launch Dashboard <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>';
                registerBtn.innerHTML = 'Initialize Neural Link <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>';
            }
        }

        // Language switching
        async function changeLanguage(lang) {
            const overlay = document.createElement('div');
            overlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);display:flex;align-items:center;justify-content:center;z-index:9999;';
            overlay.innerHTML = '<div style="background:var(--surface);padding:40px;border-radius:16px;border:1px solid var(--border);text-align:center;"><div style="width:40px;height:40px;border:3px solid rgba(255,255,255,0.1);border-top-color:var(--primary);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 16px;"></div><p style="color:var(--text);font-size:0.9rem;">Translating...</p></div>';
            document.body.appendChild(overlay);

            try {
                const response = await fetch('/api/language', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({language: lang})
                });
                const result = await response.json();
                if (result.success) location.reload();
            } catch (error) {
                console.error('Language switch error:', error);
                overlay.remove();
            }
        }
    </script>
</body>
</html>
