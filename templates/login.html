<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agéiz — Neural Yield Intelligence</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050508;
            --surface: #0F0F1A;
            --primary: #6366F1; /* Indigo AI Pulse */
            --primary-glow: rgba(99, 102, 241, 0.3);
            --accent: #06B6D4; /* Cyan Cyber */
            --border: rgba(255, 255, 255, 0.08);
            --text: #F8FAFC;
            --text-dim: #94A3B8;
            --error: #EF4444;
            --glass: rgba(15, 15, 26, 0.7);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            overflow: hidden;
        }

        /* Animated Background */
        .bg-glow {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100vw;
            height: 100vh;
            background: 
                radial-gradient(circle at 20% 20%, var(--primary-glow) 0%, transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(6, 182, 212, 0.15) 0%, transparent 40%);
            z-index: -1;
            filter: blur(80px);
        }

        .login-container {
            width: 100%;
            max-width: 440px;
            position: relative;
        }

        .brand-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #FFF 0%, #6366F1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 0.9rem;
            color: var(--text-dim);
            letter-spacing: 1px;
            text-transform: uppercase;
            font-weight: 500;
        }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 48px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .tabs {
            display: flex;
            background: rgba(0, 0, 0, 0.2);
            padding: 6px;
            border-radius: 14px;
            margin-bottom: 32px;
            border: 1px solid var(--border);
        }

        .tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-dim);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: none;
            border: none;
            border-radius: 10px;
        }

        .tab.active {
            color: #FFF;
            background: var(--primary);
            box-shadow: 0 4px 15px var(--primary-glow);
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-dim);
            margin-bottom: 10px;
            margin-left: 4px;
        }

        .input-wrapper {
            position: relative;
        }

        input {
            width: 100%;
            padding: 14px 18px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: #FFF;
            font-family: inherit;
            font-size: 0.95rem;
            transition: all 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 0 0 4px var(--primary-glow);
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            background: var(--primary);
            color: #FFF;
            border: none;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px var(--primary-glow);
            filter: brightness(1.1);
        }

        .error-msg {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: var(--error);
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 0.85rem;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-section {
            display: none;
        }

        .form-section.active {
            display: block;
            animation: slideIn 0.4s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .footer-note {
            margin-top: 40px;
            text-align: center;
            font-size: 0.75rem;
            color: var(--text-dim);
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="bg-glow"></div>

    <div class="login-container">
        <header class="brand-header">
            <h1 class="logo">Agéiz</h1>
            <p class="subtitle">Neural Yield Management</p>
        </header>

        <!-- Language Selector -->
        <div style="margin-bottom: 24px; text-align: center;">
            <select id="language-selector" onchange="changeLanguage(this.value)" style="background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: var(--text); padding: 8px 16px; border-radius: 8px; font-size: 0.8rem; cursor: pointer;">
                <option value="english">🇬🇧 English</option>
                <option value="amharic">🇪🇹 አማርኛ</option>
                <option value="oromoo">🇪🇹 Afaan Oromoo</option>
                <option value="tigrinya">🇪🇭 ትግርኛ</option>
                <option value="chinese">🇨🇳 中文</option>
            </select>
        </div>

        <div class="glass-card">
            {% if error %}
            <div class="error-msg">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
                {{ error }}
            </div>
            {% endif %}

            <div class="tabs">
                <button type="button" class="tab active" data-tab="login">Sign In</button>
                <button type="button" class="tab" data-tab="register">Register</button>
            </div>

            <form action="/auth/login" method="POST" class="form-section active" id="login-form">
                <div class="form-group">
                    <label>Enterprise Email</label>
                    <input type="email" name="email" required placeholder="name@resort.ai">
                </div>
                <div class="form-group">
                    <label>Security Key</label>
                    <input type="password" name="password" required placeholder="••••••••">
                </div>
                <button type="submit" class="submit-btn">
                    Launch Dashboard
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
                </button>
            </form>

            <form action="/auth/register" method="POST" class="form-section" id="register-form">
                <div class="form-group">
                    <label>Corporate Email</label>
                    <input type="email" name="email" required placeholder="name@resort.ai">
                </div>
                <div class="form-group">
                    <label>Create Password</label>
                    <input type="password" name="password" required placeholder="••••••••">
                </div>
                <button type="submit" class="submit-btn">
                    Initialize Neural Link
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
                </button>
            </form>
        </div>

        <div class="footer-note">Precision Intelligence • Powered by Agéiz</div>
    </div>

    <script>
        const tabs = document.querySelectorAll('.tab');
        const sections = document.querySelectorAll('.form-section');

        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                const tabName = tab.dataset.tab;
                tabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                sections.forEach(s => s.classList.remove('active'));
                document.getElementById(`${tabName}-form`).classList.add('active');
            });
        });

        {% if tab == 'register' %}
        document.querySelector('[data-tab="register"]').click();
        {% endif %}

        // Language switching
        async function changeLanguage(lang) {
            // Show loading
            const overlay = document.createElement('div');
            overlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);display:flex;align-items:center;justify-content:center;z-index:9999;';
            overlay.innerHTML = '<div style="background:var(--surface);padding:40px;border-radius:16px;border:1px solid var(--border);text-align:center;"><div style="width:40px;height:40px;border:3px solid rgba(255,255,255,0.1);border-top-color:var(--primary);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 16px;"></div><p style="color:var(--text);font-size:0.9rem;">Translating...</p></div>';
            document.body.appendChild(overlay);

            try {
                const response = await fetch('/api/language', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({language: lang})
                });
                const result = await response.json();
                if (result.success) {
                    location.reload();
                }
            } catch (error) {
                console.error('Language switch error:', error);
                overlay.remove();
            }
        }
    </script>
</body>
</html>
